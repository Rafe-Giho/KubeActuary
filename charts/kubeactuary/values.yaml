controller:
  enabled: false
  image:
    repository: ghcr.io/kubeactuary/kubeactuary-controller
    tag: "0.9.5"
    pullPolicy: IfNotPresent
  namespace: kubeactuary-system
  rbac:
    scope: namespace
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
  serviceAccount:
    name: kubeactuary-controller
