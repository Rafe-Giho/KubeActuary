{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.controller.serviceAccount.name | quote }}
  namespace: {{ .Values.controller.namespace | quote }}
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeactuary
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeactuary
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ .Values.controller.serviceAccount.name | quote }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | quote }}
          command:
            - python3
            - /app/bin/kube-actuary-controller
          args:
            - serve
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: {{ .Values.controller.resources.requests.cpu | quote }}
              memory: {{ .Values.controller.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.controller.resources.limits.cpu | quote }}
              memory: {{ .Values.controller.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
{{- end }}
