{{- if .Values.controller.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.controller.namespace | quote }}
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.controller.serviceAccount.name | quote }}
  namespace: {{ .Values.controller.namespace | quote }}
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
{{- if eq .Values.controller.rbac.scope "cluster" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.controller.serviceAccount.name | quote }}
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
rules:
  - apiGroups: ["ops.kubeactuary.dev"]
    resources: ["operationcapsules"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ops.kubeactuary.dev"]
    resources: ["operationcapsules/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.controller.serviceAccount.name | quote }}
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: {{ .Values.controller.serviceAccount.name | quote }}
    namespace: {{ .Values.controller.namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.controller.serviceAccount.name | quote }}
{{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.controller.serviceAccount.name | quote }}
  namespace: {{ .Values.controller.namespace | quote }}
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
rules:
  - apiGroups: ["ops.kubeactuary.dev"]
    resources: ["operationcapsules"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ops.kubeactuary.dev"]
    resources: ["operationcapsules/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.controller.serviceAccount.name | quote }}
  namespace: {{ .Values.controller.namespace | quote }}
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: {{ .Values.controller.serviceAccount.name | quote }}
    namespace: {{ .Values.controller.namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.controller.serviceAccount.name | quote }}
{{- end }}
{{- end }}
