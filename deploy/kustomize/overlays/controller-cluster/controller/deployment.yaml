apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeactuary-controller
  namespace: kubeactuary-system
  labels:
    app.kubernetes.io/name: kubeactuary
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeactuary
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeactuary
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: kubeactuary-controller
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/kubeactuary/kubeactuary-controller:0.2.0
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /app/bin/kube-actuary-controller
          args:
            - serve
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
