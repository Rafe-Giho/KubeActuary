name: CI

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify CLI and release checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show tool versions
        run: |
          python3 --version

      - name: Run release verification
        run: python3 -B scripts/verify_release.py --version current

      - name: Render release notes dry run
        run: python3 -B scripts/generate_release_notes.py --version 0.2.0 --output -
